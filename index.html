<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel & Sara 💍</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #fff8f5;
    text-align: center;
    overflow-x: hidden;
}

header {
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                url('fotos/foto1.jpeg') center/cover no-repeat;
    color: white;
    padding: 120px 20px;
}

h1 {
    font-size: 48px;
    margin: 0;
}

section {
    padding: 50px 20px;
}

button {
    background: #b5838d;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #a06c75;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    max-width: 1000px;
    margin: auto;
}

.galeria img {
    width: 100%;
    border-radius: 15px;
    transition: transform 0.4s;
}

.galeria img:hover {
    transform: scale(1.05);
}

footer {
    background: #b5838d;
    color: white;
    padding: 20px;
}

/* PETALAS */
.petala {
    position: fixed;
    top: -10px;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: cair linear infinite;
}

@keyframes cair {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<!-- 🎵 Música -->

<script>
// 🌸 Gerar pétalas
function criarPetala() {
    const petala = document.createElement("div");
    petala.classList.add("petala");

    petala.style.left = Math.random() * 100 + "vw";
    petala.style.animationDuration = (Math.random() * 5 + 5) + "s";

    document.body.appendChild(petala);

    setTimeout(() => {
        petala.remove();
    }, 10000);
}

setInterval(criarPetala, 500);
</script>

</body>
