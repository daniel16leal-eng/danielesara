<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel & Sara 💍</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff8f5;
    text-align: center;
}

header {
    background: #d4a5a5;
    color: white;
    padding: 40px 20px;
}

h1 {
    margin: 0;
    font-size: 40px;
}

h2 {
    margin-top: 10px;
    font-weight: normal;
}

.contador {
    font-size: 24px;
    margin-top: 15px;
}

section {
    padding: 40px 20px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    max-width: 1000px;
    margin: auto;
}

.galeria img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s;
}

.galeria img:hover {
    transform: scale(1.05);
}

footer {
    background: #d4a5a5;
    color: white;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Daniel & Sara 💍</h1>
    <h2>Nosso grande dia</h2>
    <div class="contador" id="contador"></div>
</header>

<section>
    <h2>📸 Nossa História</h2>
    <div class="galeria">
        <img src="fotos/foto1.jpeg">
        <img src="fotos/foto2.jpeg">
        <img src="fotos/foto3.jpeg">
        <img src="fotos/foto4.jpeg">
        <img src="fotos/foto5.jpeg">
        <img src="fotos/foto6.jpeg">
        <img src="fotos/foto7.jpeg">
    </div>
</section>

<footer>
    Feito com ❤️ para o nosso casamento
</footer>

<script>
// ALTERE A DATA AQUI
const dataCasamento = new Date("2026-12-20T18:00:00").getTime();

const contador = document.getElementById("contador");

setInterval(function() {
    const agora = new Date().getTime();
    const distancia = dataCasamento - agora;

    const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

    contador.innerHTML = `Faltam ${dias} dias, ${horas}h ${minutos}m ${segundos}s`;

    if (distancia < 0) {
        contador.innerHTML = "💍 É hoje!";
    }
}, 1000);
</script>

</body>
</html>
